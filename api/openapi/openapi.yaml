openapi: 3.0.3
info:
  title: FalseFlag Control Plane API
  description: |
    The FalseFlag control-plane REST surface. Slice 3 extends slice 2's
    projects+flags+evaluate surface with environments, segments,
    snapshots, audit search, and evaluation-with-trace. The full
    operator/CRD-integration surface lands in slice 4.
  version: 0.3.0
  contact:
    name: FalseFlag
    url: https://github.com/depot/falseflag
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: health
  - name: projects
  - name: environments
  - name: segments
  - name: flags
  - name: snapshots
  - name: evaluation
  - name: audit
paths:
  /v1/health:
    get:
      operationId: getHealth
      summary: Liveness/readiness probe
      tags: [health]
      responses:
        "200":
          description: Service is serving traffic.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/projects:
    get:
      operationId: listProjects
      summary: List all projects
      tags: [projects]
      responses:
        "200":
          description: Projects listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectList"
    post:
      operationId: createProject
      summary: Create a project
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /v1/projects/{slug}:
    parameters:
      - $ref: "#/components/parameters/ProjectSlug"
    get:
      operationId: getProject
      summary: Get a project by slug
      tags: [projects]
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/Error"

  /v1/projects/{slug}/flags:
    parameters:
      - $ref: "#/components/parameters/ProjectSlug"
    get:
      operationId: listFlags
      summary: List flags in the project
      tags: [flags]
      responses:
        "200":
          description: Flags listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlagList"
        "404":
          $ref: "#/components/responses/Error"
    post:
      operationId: createFlag
      summary: Create a flag in the project
      tags: [flags]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFlagRequest"
      responses:
        "201":
          description: Flag created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flag"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /v1/projects/{slug}/flags/{key}:
    parameters:
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/FlagKey"
    get:
      operationId: getFlag
      summary: Get a flag and its latest version
      tags: [flags]
      responses:
        "200":
          description: Flag with latest version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlagWithLatest"
        "404":
          $ref: "#/components/responses/Error"
    put:
      operationId: publishFlagVersion
      summary: Publish a new flag version
      description: |
        Compiles the submitted source using the requested strategy and
        stores the resulting IR as a new flag_versions row. The new
        version's number is one higher than the previous version.
      tags: [flags]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishFlagVersionRequest"
      responses:
        "200":
          description: Version published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlagVersion"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
        "422":
          description: |
            Compile failure (TS syntax error, sandbox violation,
            invalid IR). The response body carries structured
            details so editors can highlight the offending location.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompileError"

  /v1/projects/{slug}/flags/{key}/versions:
    parameters:
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/FlagKey"
    get:
      operationId: listFlagVersions
      summary: List all versions of a flag (newest first)
      tags: [flags]
      responses:
        "200":
          description: Versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlagVersionList"
        "404":
          $ref: "#/components/responses/Error"

  /v1/projects/{slug}/flags/{key}/evaluate:
    parameters:
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/FlagKey"
    post:
      operationId: evaluateFlag
      summary: Evaluate the flag's latest version against a context
      tags: [evaluation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluationRequest"
      responses:
        "200":
          description: Decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"
        "404":
          $ref: "#/components/responses/Error"

  /v1/projects/{slug}/flags/{key}/evaluate-trace:
    parameters:
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/FlagKey"
    post:
      operationId: evaluateFlagWithTrace
      summary: Evaluate with a predicate-by-predicate trace tree
      description: |
        Same evaluation as POST /evaluate, but evaluates every rule
        (even those that match early) and returns the trace path. Use
        in the demo dashboard to explain a decision.
      tags: [evaluation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluationRequest"
      responses:
        "200":
          description: Decision plus trace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateTraceResponse"
        "404":
          $ref: "#/components/responses/Error"

  /v1/projects/{slug}/environments:
    parameters:
      - $ref: "#/components/parameters/ProjectSlug"
    get:
      operationId: listEnvironments
      summary: List environments in the project
      tags: [environments]
      responses:
        "200":
          description: Environment listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentList"
        "404":
          $ref: "#/components/responses/Error"
    post:
      operationId: createEnvironment
      summary: Create an environment in the project
      tags: [environments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnvironmentRequest"
      responses:
        "201":
          description: Environment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /v1/projects/{slug}/environments/{envSlug}:
    parameters:
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/EnvironmentSlug"
    get:
      operationId: getEnvironment
      summary: Get an environment by slug
      tags: [environments]
      responses:
        "200":
          description: Environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
        "404":
          $ref: "#/components/responses/Error"

  /v1/projects/{slug}/segments:
    parameters:
      - $ref: "#/components/parameters/ProjectSlug"
    get:
      operationId: listSegments
      summary: List segments in the project
      tags: [segments]
      responses:
        "200":
          description: Segment listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegmentList"
        "404":
          $ref: "#/components/responses/Error"
    post:
      operationId: createSegment
      summary: Create a project-scoped reusable predicate
      tags: [segments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSegmentRequest"
      responses:
        "201":
          description: Segment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /v1/projects/{slug}/segments/{segKey}:
    parameters:
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/SegmentKey"
    get:
      operationId: getSegment
      summary: Get a segment by key
      tags: [segments]
      responses:
        "200":
          description: Segment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
        "404":
          $ref: "#/components/responses/Error"
    put:
      operationId: updateSegment
      summary: Replace a segment's name/description/predicate
      tags: [segments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSegmentRequest"
      responses:
        "200":
          description: Segment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/projects/{slug}/snapshots:
    parameters:
      - $ref: "#/components/parameters/ProjectSlug"
    get:
      operationId: listSnapshots
      summary: List snapshots in the project (newest first)
      tags: [snapshots]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Snapshot listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotList"
        "404":
          $ref: "#/components/responses/Error"
    post:
      operationId: compileSnapshot
      summary: Compile a project-wide snapshot from latest flag versions
      tags: [snapshots]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompileSnapshotRequest"
      responses:
        "201":
          description: Snapshot compiled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapshot"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/projects/{slug}/snapshots/latest:
    parameters:
      - $ref: "#/components/parameters/ProjectSlug"
    get:
      operationId: getLatestSnapshot
      summary: Get the most recently compiled snapshot
      tags: [snapshots]
      responses:
        "200":
          description: Snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapshot"
        "404":
          $ref: "#/components/responses/Error"

  /v1/projects/{slug}/snapshots/{id}:
    parameters:
      - $ref: "#/components/parameters/ProjectSlug"
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getSnapshot
      summary: Get a snapshot by id
      tags: [snapshots]
      responses:
        "200":
          description: Snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapshot"
        "404":
          $ref: "#/components/responses/Error"

  /v1/projects/{slug}/audit-events:
    parameters:
      - $ref: "#/components/parameters/ProjectSlug"
    get:
      operationId: listAuditEvents
      summary: Search audit events for the project (newest first)
      tags: [audit]
      parameters:
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: actor
          in: query
          required: false
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        "200":
          description: Audit event listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventList"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

components:
  parameters:
    ProjectSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z0-9][a-z0-9-]{0,62}$"
    FlagKey:
      name: key
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z0-9][a-z0-9-_.]{0,127}$"
    EnvironmentSlug:
      name: envSlug
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z0-9][a-z0-9-]{0,62}$"
    SegmentKey:
      name: segKey
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z0-9][a-z0-9-_.]{0,127}$"

  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    HealthResponse:
      type: object
      required: [status, service, version]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
        version:
          type: string
        probe:
          type: string
        timestamp:
          type: string
          format: date-time

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        details:
          type: string

    Strategy:
      type: string
      enum: [json, cel, typescript]

    ValueType:
      type: string
      enum: [boolean, string, number, object]

    Project:
      type: object
      required: [id, slug, display_name, config_strategy, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        display_name:
          type: string
        config_strategy:
          $ref: "#/components/schemas/Strategy"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Project"

    CreateProjectRequest:
      type: object
      required: [slug, display_name, config_strategy]
      properties:
        slug:
          type: string
        display_name:
          type: string
        config_strategy:
          $ref: "#/components/schemas/Strategy"

    Flag:
      type: object
      required:
        [id, project_id, key, name, description, value_type, default_value, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        key:
          type: string
        name:
          type: string
        description:
          type: string
        value_type:
          $ref: "#/components/schemas/ValueType"
        default_value:
          description: JSON-encoded default value. Type matches value_type.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FlagList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Flag"

    FlagWithLatest:
      type: object
      required: [flag]
      properties:
        flag:
          $ref: "#/components/schemas/Flag"
        latest_version:
          $ref: "#/components/schemas/FlagVersion"

    CreateFlagRequest:
      type: object
      required: [key, name, value_type, default_value]
      properties:
        key:
          type: string
        name:
          type: string
        description:
          type: string
        value_type:
          $ref: "#/components/schemas/ValueType"
        default_value:
          description: JSON-encoded default value.

    FlagVersion:
      type: object
      required: [id, flag_id, version, strategy, source, compiled, published_at]
      properties:
        id:
          type: string
          format: uuid
        flag_id:
          type: string
          format: uuid
        version:
          type: integer
          format: int32
        strategy:
          $ref: "#/components/schemas/Strategy"
        source:
          description: Raw user-submitted source (JSON, CEL-leaved IR, or TS DSL output).
        compiled:
          description: Normalized rules-tree IR ready for evaluation.
        source_text:
          type: string
          nullable: true
          description: |
            Raw author input (e.g. the .ts file contents) preserved
            for the dashboard's source view. Null for versions
            written before this field existed or for publishers that
            did not supply it.
        published_at:
          type: string
          format: date-time

    FlagVersionList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FlagVersion"

    PublishFlagVersionRequest:
      type: object
      required: [strategy, source]
      properties:
        strategy:
          $ref: "#/components/schemas/Strategy"
        source:
          description: Source for the chosen strategy.
        source_text:
          type: string
          maxLength: 32768
          description: |
            Optional raw author input. When present and
            strategy=typescript, the server treats this as
            authoritative and re-compiles it; the supplied `source`
            (a CLI-side pre-compile of the same input) is preserved
            for backwards compatibility but is not the source of
            truth.

    CompileError:
      type: object
      required: [message]
      properties:
        message:
          type: string
        details:
          type: array
          items:
            type: object
            required: [text]
            properties:
              file:
                type: string
              line:
                type: integer
                format: int32
              column:
                type: integer
                format: int32
              text:
                type: string

    EvaluationRequest:
      type: object
      required: [context]
      properties:
        context:
          type: object
          additionalProperties: true

    Decision:
      type: object
      required: [value, reason, version]
      properties:
        value:
          description: Resolved value; type matches the flag's value_type.
        reason:
          type: string
          enum:
            [default, rule_matched, rollout_in_bucket, rollout_out_of_bucket, type_mismatch, error]
        rule_id:
          type: string
        version:
          type: integer
          format: int32

    Environment:
      type: object
      required: [id, project_id, slug, name, created_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time

    EnvironmentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Environment"

    CreateEnvironmentRequest:
      type: object
      required: [slug, name]
      properties:
        slug:
          type: string
        name:
          type: string

    Segment:
      type: object
      required: [id, project_id, key, name, description, predicate, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        key:
          type: string
        name:
          type: string
        description:
          type: string
        predicate:
          description: An IR Predicate JSON. Validated server-side at write time.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SegmentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Segment"

    CreateSegmentRequest:
      type: object
      required: [key, name, predicate]
      properties:
        key:
          type: string
        name:
          type: string
        description:
          type: string
        predicate:
          description: An IR Predicate JSON.

    UpdateSegmentRequest:
      type: object
      required: [name, predicate]
      properties:
        name:
          type: string
        description:
          type: string
        predicate:
          description: An IR Predicate JSON.

    Snapshot:
      type: object
      required: [id, project_id, version, compiled, created_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        environment_id:
          type: string
          format: uuid
          nullable: true
        version:
          type: integer
          format: int32
        compiled:
          description: |
            Compiled bundle shape `{flags: {[key]: RulesTree}}`. Flags without
            a published version are omitted; projects with zero published
            flags compile to `{flags: {}}`.
        created_at:
          type: string
          format: date-time

    SnapshotList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Snapshot"

    CompileSnapshotRequest:
      type: object
      properties:
        environment_slug:
          type: string
          description: |
            Optional environment to associate with the snapshot. In slice 3
            environments are reference data; the column is captured but
            does not influence the compiled bundle. Slice 4 will use it.

    AuditEvent:
      type: object
      required: [id, action, payload, created_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
          nullable: true
        flag_id:
          type: string
          format: uuid
          nullable: true
        action:
          type: string
        actor:
          type: string
        payload:
          description: Free-form per-action payload.
        created_at:
          type: string
          format: date-time

    AuditEventList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor for the next page. Pass back in the `cursor`
            query param. Absent or null when no more results exist.

    EvaluateTraceResponse:
      type: object
      required: [decision, trace]
      properties:
        decision:
          $ref: "#/components/schemas/Decision"
        trace:
          $ref: "#/components/schemas/EvaluationTrace"

    EvaluationTrace:
      type: object
      required: [evaluated_rules, default_used]
      properties:
        evaluated_rules:
          type: array
          items:
            $ref: "#/components/schemas/TraceRule"
        default_used:
          type: boolean
        matched_rule_id:
          type: string

    TraceRule:
      type: object
      required: [rule_id, matched, predicate]
      properties:
        rule_id:
          type: string
        matched:
          type: boolean
        predicate:
          $ref: "#/components/schemas/TraceNode"
        error:
          type: string
          description: Set when the predicate evaluation itself errored.

    TraceNode:
      type: object
      required: [kind, result]
      properties:
        kind:
          type: string
        attr:
          type: string
        attr_value:
          description: Resolved attribute value (for comparison predicates).
        expected:
          description: Comparison RHS (for eq/neq/gt/gte/lt/lte/matches).
        expected_values:
          type: array
          items: {}
          description: Membership RHS (for `in`).
        pattern:
          type: string
        salt:
          type: string
        percent:
          type: integer
          format: int32
        bucket:
          type: integer
          format: int32
