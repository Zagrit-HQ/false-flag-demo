version: "2"
sql:
  - engine: postgresql
    schema: db/migrations
    queries: db/queries
    gen:
      go:
        package: db
        out: internal/db
        sql_package: pgx/v5
        emit_interface: true
  - engine: sqlite
    schema: db/migrations/sqlite
    queries: db/queries/sqlite
    gen:
      go:
        package: dbsqlite
        out: internal/db/sqlite
        sql_package: database/sql
        emit_interface: true
        emit_pointers_for_null_types: true
