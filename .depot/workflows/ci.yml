name: ci

on:
  workflow_dispatch:
  pull_request:
    branches: ["**"]
  push:
    branches: ["**"]

permissions:
  contents: read
  id-token: write

env:
  GO_VERSION: "1.26.0"
  NODE_VERSION: "22"
  PNPM_VERSION: "10.0.0"
  PLAYWRIGHT_VERSION: "1.49.1"

jobs:
  linter:
    name: linter
    uses: ./.depot/workflows/linter.yaml
  test:
    name: test
    uses: ./.depot/workflows/test.yaml

  build:
    runs-on: depot-ubuntu-latest
    outputs:
      build-id: ${{ steps.bake.outputs.build-id }}
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: depot/setup-action@v1
      - id: bake
        uses: depot/bake-action@v1
        with:
          save: true

  setup-e2e:
    runs-on: depot-ubuntu-latest
    snapshot: e2e-demo:v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml
      - name: pnpm install
        working-directory: js
        run: pnpm install --frozen-lockfile
      - name: pnpm generate
        working-directory: js
        run: pnpm generate
      - name: install playwright chromium
        working-directory: js
        run: pnpm --filter @falseflag/dashboard exec playwright install --with-deps chromium

  test-e2e:
    needs: [build, setup-e2e]
    runs-on:
      image: e2e-demo
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
        with:
          clear: false
      - uses: depot/setup-action@v1
      - uses: depot/pull-action@v1
        with:
          build-id: ${{ needs.build.outputs.build-id }}
      - name: docker compose up
        run: docker compose up -d --no-build --wait --wait-timeout 60
      - name: Run test
        working-directory: js/apps/dashboard
        env:
          FALSEFLAG_DASHBOARD_URL: http://127.0.0.1:3030
          FALSEFLAG_API_BASE_URL: http://127.0.0.1:8080
        run: pnpm exec playwright test --shard ${{ matrix.shard }}/4
      - name: dump compose logs (on failure)
        if: failure()
        run: docker compose logs > compose-logs.txt
