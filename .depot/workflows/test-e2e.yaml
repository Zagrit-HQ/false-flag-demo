# Depot CI Migration
# Source: .github/workflows/test-e2e.yaml
#
# No changes were necessary.

name: ci-test-e2e
on:
  workflow_call:
    inputs:
      build-id:
        required: true
        type: string
permissions:
  contents: read
  id-token: write
env:
  GO_VERSION: "1.26.0"
  NODE_VERSION: "22"
  PNPM_VERSION: "10.0.0"
  PLAYWRIGHT_VERSION: "1.49.1"
jobs:
  dashboard-e2e:
    name: dashboard-e2e (${{ matrix.backend }})
    runs-on:
      image: e2e-base
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        backend: [postgres, sqlite]
        shard: [1, 2, 3, 4]
    env:
      COMPOSE_FILE: ${{ matrix.backend == 'postgres' && 'compose.yaml' || 'compose.sqlite.yaml' }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
      - uses: depot/setup-action@v1
      - uses: depot/pull-action@v1
        with:
          build-id: ${{ inputs.build-id }}
      - name: docker compose up
        run: docker compose -f "${COMPOSE_FILE}" up -d --no-build --wait --wait-timeout 60
      - name: Run test
        working-directory: js/apps/dashboard
        env:
          FALSEFLAG_DASHBOARD_URL: http://127.0.0.1:3030
          FALSEFLAG_API_BASE_URL: http://127.0.0.1:8080
        run: pnpm exec playwright test --shard ${{ matrix.shard }}/4
      - name: dump compose logs (on failure)
        if: failure()
        run: docker compose -f "${COMPOSE_FILE}" logs > compose-logs.txt
