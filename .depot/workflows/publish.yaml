name: publish

on:
  push:
    tags:
      - "[0-9].[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semver tag to publish, for manual retries
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: d58mfwccbf.registry.depot.dev/falseflag
  IMAGE_REGISTRY_HOST: d58mfwccbf.registry.depot.dev

jobs:
  publish-images:
    name: publish-images
    runs-on: depot-ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - uses: depot/setup-action@v1

      - name: Validate publish tag
        id: publish
        shell: bash
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          if [[ ! "$tag" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "publish tag must be valid semver with an optional v prefix, got $tag" >&2
            exit 1
          fi

          version="${tag#v}"
          major_minor="${version%.*}"
          commit="$(git rev-parse HEAD)"

          echo "Tag: $tag"
          echo "Version: $version"
          echo "Major/minor: $major_minor"
          echo "Commit: $commit"
          echo "Registry: $IMAGE_REGISTRY"

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "major_minor=$major_minor"
            echo "commit=$commit"
            echo "registry=$IMAGE_REGISTRY"
          } >> "$GITHUB_OUTPUT"

      - name: Login to Depot Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.IMAGE_REGISTRY_HOST }}
          username: x-token
          password: ${{ secrets.DEPOT_FALSEFLAG_PUSH }}

      - name: Publish images
        uses: depot/bake-action@v1
        env:
          VERSION: ${{ steps.publish.outputs.version }}
          MAJOR_MINOR: ${{ steps.publish.outputs.major_minor }}
          COMMIT: ${{ steps.publish.outputs.commit }}
          REGISTRY: ${{ env.IMAGE_REGISTRY }}
        with:
          files: |
            ./docker-bake.hcl
          push: true
          sbom: true
          provenance: true
