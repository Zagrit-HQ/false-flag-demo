# Depot CI Migration
# Source: .github/workflows/security.yaml
#
# Changes made:
# - Changed GitHub runs-on labels to their Depot equivalents

name: ci-security
on:
  workflow_call:
    inputs:
      build-id:
        required: true
        type: string
permissions:
  contents: read
  id-token: write
jobs:
  image-scan:
    name: image-scan
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: depot/setup-action@v1
      - uses: depot/pull-action@v1
        with:
          build-id: ${{ inputs.build-id }}
      # --ignore-unfixed: only fail on CVEs that have a fix available;
      # unfixable base-image CVEs aren't actionable in a feature-flag
      # service. Slice 7b inherits the same threshold. Each scan uses
      # continue-on-error so devs see every image's CVEs in one log;
      # the aggregator step fails the job if any scan reported issues.
      - name: Install trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin
          trivy --version
      - name: trivy image scan (api)
        id: trivy_api
        continue-on-error: true
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --format table \
            ghcr.io/depot/falseflag/api:dev
      - name: trivy image scan (proxy)
        id: trivy_proxy
        continue-on-error: true
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --format table \
            ghcr.io/depot/falseflag/proxy:dev
      - name: trivy image scan (operator)
        id: trivy_operator
        continue-on-error: true
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --format table \
            ghcr.io/depot/falseflag/operator:dev
      - name: trivy image scan (mcp)
        id: trivy_mcp
        continue-on-error: true
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --format table \
            ghcr.io/depot/falseflag/mcp:dev
      - name: fail if any scan reported vulnerabilities
        run: |
          set -euo pipefail
          fail=0
          for name in api proxy operator mcp; do
            case "${name}" in
              api)       outcome="${{ steps.trivy_api.outcome }}";;
              proxy)     outcome="${{ steps.trivy_proxy.outcome }}";;
              operator)  outcome="${{ steps.trivy_operator.outcome }}";;
              mcp)       outcome="${{ steps.trivy_mcp.outcome }}";;
            esac
            echo "${name}: ${outcome}"
            if [ "${outcome}" != "success" ]; then
              fail=1
            fi
          done
          exit "${fail}"
