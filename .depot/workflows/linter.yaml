name: ci-linter
on:
  workflow_call:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.0"
  NODE_VERSION: "22"
  PNPM_VERSION: "10.0.0"
  SPECTRAL_VERSION: "6.14.2"

jobs:
  lint:
    name: lint
    runs-on: depot-ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml

      - parallel:
          - name: Download Go dependencies
            run: go mod download

          - name: pnpm install
            working-directory: js
            run: pnpm install --frozen-lockfile

          - name: Install Spectral
            run: npm install -g "@stoplight/spectral-cli@${SPECTRAL_VERSION}"

      - fail-fast: false
        parallel:
          - name: generate-check
            run: make generate-check

          - name: lint-go
            run: go tool golangci-lint run --allow-parallel-runners ./...

          - name: lint-js
            run: make lint-js

          - name: typecheck-js
            working-directory: js
            run: pnpm typecheck

          - name: lint-openapi
            run: |
              spectral lint \
                --ruleset .spectral.yaml \
                --format github-actions \
                api/openapi/openapi.yaml
