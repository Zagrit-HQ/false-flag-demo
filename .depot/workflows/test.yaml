# Depot CI Migration
# Source: .github/workflows/test.yaml
#
# Changes made:
# - Changed GitHub runs-on labels to their Depot equivalents

name: ci-test
on:
  workflow_call:
permissions:
  contents: read
env:
  GO_VERSION: "1.26.0"
  NODE_VERSION: "22"
  PNPM_VERSION: "10.0.0"
jobs:
  test-go:
    name: test-go
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: make test-go
        run: make test-go
  test-js:
    name: test-js
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml
      - name: pnpm install
        working-directory: js
        run: pnpm install --frozen-lockfile
      - name: pnpm generate
        working-directory: js
        run: pnpm generate
      - name: make test-js
        run: make test-js
  sdk-conformance:
    name: sdk-conformance
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml
      - name: pnpm install
        working-directory: js
        run: pnpm install --frozen-lockfile
      - name: pnpm generate
        working-directory: js
        run: pnpm generate
      - name: make sdk-conformance
        run: make sdk-conformance
  contract-test:
    name: contract-test (${{ matrix.backend }})
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        backend: [postgres, sqlite]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: falseflag
          POSTGRES_PASSWORD: falseflag
          POSTGRES_DB: falseflag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U falseflag -d falseflag" --health-interval 5s --health-timeout 3s --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # The service container's health-check is GitHub's own; this
      # extra poll guards the rare case where the container is
      # reported "started" before pg_isready inside it succeeds. Not
      # an artificial sleep — bounded readiness check with a real exit
      # condition.
      - name: wait for postgres
        if: matrix.backend == 'postgres'
        run: |
          for _ in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U falseflag >/dev/null 2>&1; then
              echo "postgres ready"; exit 0
            fi
            sleep 2
          done
          echo "postgres never became ready"; exit 1
      - name: prepare sqlite scratch dir
        if: matrix.backend == 'sqlite'
        run: mkdir -p /tmp/ff-contract && rm -f /tmp/ff-contract/*
      - name: make contract-test
        env:
          FALSEFLAG_TEST_DATABASE_URL: ${{ matrix.backend == 'postgres' && 'postgres://falseflag:falseflag@localhost:5432/falseflag?sslmode=disable' || 'sqlite:///tmp/ff-contract/test.db' }}
        run: make contract-test
