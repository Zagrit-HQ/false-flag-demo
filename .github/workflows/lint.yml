name: lint

on:
  push:
    branches:
      - "*"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Read tool versions
        id: tool-versions
        run: |
          echo "node=$(awk '/^nodejs / {print $2}' .tool-versions)" >> "$GITHUB_OUTPUT"
          echo "go=$(awk '/^golang / {print $2}' .tool-versions)" >> "$GITHUB_OUTPUT"
          echo "pnpm=$(awk '/^pnpm / {print $2}' .tool-versions)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.tool-versions.outputs.go }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.tool-versions.outputs.node }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ steps.tool-versions.outputs.pnpm }}

      - name: pnpm install
        working-directory: js
        run: pnpm install --frozen-lockfile

      - name: Check codegen freshness
        run: make generate-check

      - name: Lint go
        run: make lint-go

      - name: Lint JavaScript
        working-directory: js
        run: pnpm lint

      - name: Typecheck
        working-directory: js
        run: pnpm typecheck

      - name: Install spectral
        run: npm install -g "@stoplight/spectral-cli@${SPECTRAL_VERSION}"
        env:
          SPECTRAL_VERSION: "6.14.2"
      - name: Lint OpenAPI
        # github-actions format emits ::warning / ::error annotations
        # that surface in the PR's Files Changed view.
        run: |
          spectral lint \
            --ruleset .spectral.yaml \
            --format github-actions \
            api/openapi/openapi.yaml
