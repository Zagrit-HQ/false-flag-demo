name: ci

on:
  workflow_dispatch:
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read
  id-token: write

jobs:
  linter:
    name: linter
    uses: ./.github/workflows/linter.yaml

  test:
    name: test
    uses: ./.github/workflows/test.yaml

  build:
    name: build
    uses: ./.github/workflows/build.yaml

  security:
    needs: build
    name: security
    uses: ./.github/workflows/security.yaml
    with:
      build-id: ${{ needs.build.outputs.build-id }}

  test-e2e:
    needs: build
    name: test-e2e
    uses: ./.github/workflows/test-e2e.yaml
    with:
      build-id: ${{ needs.build.outputs.build-id }}
