name: ci-build

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-images:
    name: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
        id: buildx
        with:
          driver: docker-container
          use: true
      # Buildx local cache. Branch-keyed so the first PR push pays a
      # cold cache, subsequent runs on the same ref hit warm. main is
      # the universal restore-key fallback.
      - name: cache buildx layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('docker-bake.hcl', 'infra/Dockerfile*', 'go.sum', 'js/pnpm-lock.yaml') }}
          restore-keys: |
            buildx-${{ runner.os }}-${{ github.ref_name }}-
            buildx-${{ runner.os }}-main-
            buildx-${{ runner.os }}-
      - name: bake-print (sanity)
        run: make bake-print
      # `make bake` invokes `docker buildx bake` with no output flag.
      # We override per-target output to `cacheonly` so buildx still
      # produces every layer without trying to load the result into
      # the docker daemon or push to a registry (not part of slice
      # 7a). Platforms come from docker-bake.hcl (multi-arch); cache
      # rotation pattern from buildx docs avoids /tmp/.buildx-cache
      # growing unboundedly.
      - name: docker buildx bake
        run: |
          docker buildx bake \
            --builder "${{ steps.buildx.outputs.name }}" \
            --allow=fs=/tmp \
            --set "*.cache-from=type=local,src=/tmp/.buildx-cache" \
            --set "*.cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max" \
            --set "*.output=type=cacheonly" \
            default
      - name: rotate buildx cache
        run: |
          if [ -d /tmp/.buildx-cache-new ]; then
            rm -rf /tmp/.buildx-cache
            mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          fi
