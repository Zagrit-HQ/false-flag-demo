name: ci-test-e2e

on:
  workflow_call:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.0"
  NODE_VERSION: "22"
  PNPM_VERSION: "10.0.0"
  PLAYWRIGHT_VERSION: "1.49.1"

jobs:
  dashboard-e2e:
    name: dashboard-e2e (${{ matrix.backend }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        backend: [ postgres, sqlite ]
        shard: [1,2,3,4]
    env:
      COMPOSE_FILE: ${{ matrix.backend == 'postgres' && 'compose.yaml' || 'compose.sqlite.yaml' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml
      - name: pnpm install
        working-directory: js
        run: pnpm install --frozen-lockfile
      - name: pnpm generate
        working-directory: js
        run: pnpm generate
      - name: install playwright chromium
        working-directory: js
        run: pnpm --filter @falseflag/dashboard exec playwright install --with-deps chromium
      - name: docker compose up
        run: docker compose -f "${COMPOSE_FILE}" up -d --build --wait --wait-timeout 60
      - name: Run test
        working-directory: js/apps/dashboard
        env:
          FALSEFLAG_DASHBOARD_URL: http://127.0.0.1:3030
          FALSEFLAG_API_BASE_URL: http://127.0.0.1:8080
        run: pnpm exec playwright test --shard ${{ matrix.shard }}/4
      - name: dump compose logs (on failure)
        if: failure()
        run: docker compose -f "${COMPOSE_FILE}" logs > compose-logs.txt
