# Aggregates the seven generated CRDs. Regenerate via:
#   make generate
#   kubectl kustomize deploy/kustomize/overlays/dev | head
#
# Kustomize applies the CRDs first because they are cluster-scoped and
# every other resource in this overlay references them.
---
# These are concatenated copies of deploy/crds/*.yaml; the build relies
# on this single file so the kustomization doesn't list seven separate
# resources. Regenerate after touching operator/api/v1alpha1.
---
