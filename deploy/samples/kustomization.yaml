apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Applies the FalseFlag sample resources in dependency order. CRDs
# from deploy/crds/ (or deploy/kustomize/base/) must be installed
# first.
resources:
  - project.yaml
  - environment.yaml
  - segment.yaml
  - flag-json.yaml
  - flag-with-rollout.yaml
  - flagbinding.yaml
  - flagsnapshot.yaml
