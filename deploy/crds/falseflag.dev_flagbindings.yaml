---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: flagbindings.falseflag.dev
spec:
  group: falseflag.dev
  names:
    kind: FlagBinding
    listKind: FlagBindingList
    plural: flagbindings
    shortNames:
    - ffbinding
    singular: flagbinding
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.projectSlug
      name: Project
      type: string
    - jsonPath: .spec.flagKey
      name: Flag
      type: string
    - jsonPath: .spec.environments.length()
      name: Envs
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Published")].status
      name: Published
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          FlagBinding orchestrates per-environment flag publishes. When the
          binding is reconciled it republishes the referenced Flag once per
          environment, applying any per-environment overrides.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              FlagBindingSpec ties a Flag CR to one or more Environment slugs and
              optionally supplies per-environment value overrides. A FlagBinding
              is the trigger for re-publishing a Flag across its environments.
            properties:
              environments:
                description: |-
                  Environments is the list of environment slugs the binding
                  applies to. The reconciler publishes one flag version per
                  environment.
                items:
                  type: string
                minItems: 1
                type: array
              flagKey:
                description: FlagKey names the Flag this binding republishes.
                pattern: ^[a-z][a-z0-9-_.]{0,62}$
                type: string
              overrides:
                description: |-
                  Overrides maps an environment slug to a default-value
                  override. Environments missing from this map inherit the
                  parent Flag's default.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              projectSlug:
                description: ProjectSlug identifies the upstream project.
                pattern: ^[a-z][a-z0-9-]{0,62}$
                type: string
            required:
            - environments
            - flagKey
            - projectSlug
            type: object
          status:
            description: FlagBindingStatus is the observed state of a FlagBinding.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastSyncTime:
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              publishedVersions:
                additionalProperties:
                  format: int32
                  type: integer
                description: |-
                  PublishedVersions records the most recent successful publish
                  version per environment. Keyed by environment slug.
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
