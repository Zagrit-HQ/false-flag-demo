---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: rolloutpolicies.falseflag.dev
spec:
  group: falseflag.dev
  names:
    kind: RolloutPolicy
    listKind: RolloutPolicyList
    plural: rolloutpolicies
    shortNames:
    - ffrollout
    singular: rolloutpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.projectSlug
      name: Project
      type: string
    - jsonPath: .spec.name
      name: Name
      type: string
    - jsonPath: .spec.variants.length()
      name: Variants
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RolloutPolicy describes a reusable bucketing+variants policy that
          Flag CRs reference by name. It is never published to the upstream
          API as a standalone resource — it inlines into Flag publishes.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RolloutPolicySpec defines the desired state of a RolloutPolicy.
            properties:
              bucketing:
                description: Bucketing is the hash strategy for the variants.
                properties:
                  attribute:
                    description: Attribute names the evaluation-context attribute
                      used to hash.
                    type: string
                  salt:
                    description: |-
                      Salt is mixed into the hash so two policies on the same
                      attribute can produce independent splits.
                    type: string
                  strategy:
                    default: fnv1a_64
                    description: |-
                      Strategy is currently always "fnv1a_64" — the FalseFlag IR's
                      canonical bucketing function. Kept explicit so the CRD can
                      evolve without a breaking change later.
                    enum:
                    - fnv1a_64
                    type: string
                required:
                - attribute
                type: object
              name:
                description: Name is the policy's identifier — Flag CRs reference
                  it.
                pattern: ^[a-z][a-z0-9-]{0,62}$
                type: string
              projectSlug:
                description: ProjectSlug identifies the upstream project.
                pattern: ^[a-z][a-z0-9-]{0,62}$
                type: string
              variants:
                description: Variants is the list of weighted outcomes.
                items:
                  description: RolloutVariant is a single weighted outcome.
                  properties:
                    id:
                      description: ID identifies the variant for traces and analytics.
                      type: string
                    value:
                      description: |-
                        Value is the IR value emitted when this variant wins. Shape
                        matches the parent flag's ValueType.
                      x-kubernetes-preserve-unknown-fields: true
                    weight:
                      description: |-
                        Weight is the variant's share of the rollout. Weights across
                        all variants must sum to 100 — validated at translation time.
                      format: int32
                      maximum: 100
                      minimum: 0
                      type: integer
                  required:
                  - id
                  - value
                  - weight
                  type: object
                minItems: 1
                type: array
            required:
            - bucketing
            - name
            - projectSlug
            - variants
            type: object
          status:
            description: RolloutPolicyStatus is the observed state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastSyncTime:
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
