{{- if .Values.operator.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "falseflag.componentName" (dict "root" . "component" "operator") }}
  labels:
    {{- include "falseflag.componentLabels" (dict "root" . "component" "operator") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "falseflag.componentName" (dict "root" . "component" "operator") }}
subjects:
  - kind: ServiceAccount
    name: {{ include "falseflag.operatorServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
