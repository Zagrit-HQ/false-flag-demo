apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "falseflag-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "falseflag-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "falseflag-operator.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "falseflag-operator.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "falseflag-operator.serviceAccountName" . }}
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: FALSEFLAG_API_BASE_URL
              value: {{ .Values.api.baseURL | quote }}
            - name: FALSEFLAG_OPERATOR_ACTOR
              value: {{ .Values.api.actor | quote }}
            - name: FALSEFLAG_OPERATOR_METRICS_ADDR
              value: {{ .Values.probes.metricsAddr | quote }}
            - name: FALSEFLAG_OPERATOR_HEALTH_ADDR
              value: {{ .Values.probes.healthAddr | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8082
              protocol: TCP
            - name: health
              containerPort: 8083
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
