{{- if .Values.proxy.enabled -}}
{{- $component := "proxy" -}}
{{- $name := include "falseflag.componentName" (dict "root" . "component" $component) -}}
{{- $apiName := include "falseflag.componentName" (dict "root" . "component" "api") -}}
{{- $apiBaseURL := default (printf "http://%s:%v" $apiName .Values.api.service.restPort) .Values.proxy.apiBaseURL -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "falseflag.componentLabels" (dict "root" . "component" $component) | nindent 4 }}
spec:
  replicas: {{ .Values.proxy.replicaCount }}
  selector:
    matchLabels:
      {{- include "falseflag.selectorLabels" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "falseflag.componentLabels" (dict "root" . "component" $component) | nindent 8 }}
    spec:
      containers:
        - name: proxy
          image: "{{ .Values.images.proxy.repository }}:{{ include "falseflag.imageTag" (dict "root" . "image" .Values.images.proxy) }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: FALSEFLAG_PROXY_ADDR
              value: ":8081"
            - name: FALSEFLAG_API_BASE_URL
              value: {{ $apiBaseURL | quote }}
            - name: FALSEFLAG_PROXY_PROJECT_SLUG
              value: {{ .Values.proxy.projectSlug | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.global.logLevel | quote }}
            {{- with .Values.proxy.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.proxy.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "falseflag.componentLabels" (dict "root" . "component" $component) | nindent 4 }}
spec:
  type: {{ .Values.proxy.service.type }}
  selector:
    {{- include "falseflag.selectorLabels" (dict "root" . "component" $component) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.proxy.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
