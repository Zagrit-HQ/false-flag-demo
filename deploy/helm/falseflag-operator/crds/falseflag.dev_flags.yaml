---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: flags.falseflag.dev
spec:
  group: falseflag.dev
  names:
    kind: Flag
    listKind: FlagList
    plural: flags
    shortNames:
    - ffflag
    singular: flag
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.projectSlug
      name: Project
      type: string
    - jsonPath: .spec.key
      name: Key
      type: string
    - jsonPath: .status.lastPublishedVersion
      name: Version
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Flag is the declarative representation of a feature flag. The
          operator translates Spec into the slice-2 IR RulesTree shape and
          publishes through the FalseFlag API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: FlagSpec defines the desired state of a Flag.
            properties:
              bindings:
                description: |-
                  Bindings optionally publishes per-environment versions. Empty
                  means publish a single default version with no environment
                  scope.
                items:
                  description: |-
                    FlagBinding is an optional per-environment override embedded in
                    FlagSpec. When non-empty the operator publishes one flag version
                    per binding; otherwise it publishes a single default version.
                  properties:
                    default:
                      description: |-
                        Default overrides the parent flag's default for this
                        environment.
                      x-kubernetes-preserve-unknown-fields: true
                    environment:
                      description: Environment names an Environment slug in the same
                        project.
                      pattern: ^[a-z][a-z0-9-]{0,62}$
                      type: string
                    rules:
                      description: |-
                        Rules optionally replaces the parent flag's rules entirely.
                        When nil, the parent rules are inherited.
                      items:
                        description: |-
                          FlagRule is one CR-shaped rule that the operator translates into an
                          IR Rule when publishing. Either Value or RolloutRef is set.
                        properties:
                          id:
                            description: ID names the rule for trace/audit purposes.
                            type: string
                          rolloutRef:
                            description: |-
                              RolloutRef names a RolloutPolicy CR in the same namespace whose
                              bucketing+variants are inlined at publish time. Mutually
                              exclusive with Value.
                            type: string
                          value:
                            description: |-
                              Value is the static value served when the rule fires. Mutually
                              exclusive with RolloutRef.
                            x-kubernetes-preserve-unknown-fields: true
                          when:
                            description: |-
                              When is the predicate that decides whether this rule fires.
                              Permissive shape; validated by the upstream API on publish.
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                        required:
                        - id
                        - when
                        type: object
                      type: array
                  required:
                  - environment
                  type: object
                type: array
              default:
                description: Default is the value served when no rule matches.
                x-kubernetes-preserve-unknown-fields: true
              key:
                description: Key is the flag's identifier within the project.
                pattern: ^[a-z][a-z0-9-_.]{0,62}$
                type: string
              name:
                description: Name is the human-readable label.
                type: string
              projectSlug:
                description: ProjectSlug identifies the upstream project.
                pattern: ^[a-z][a-z0-9-]{0,62}$
                type: string
              rules:
                description: Rules is the ordered list of targeting rules.
                items:
                  description: |-
                    FlagRule is one CR-shaped rule that the operator translates into an
                    IR Rule when publishing. Either Value or RolloutRef is set.
                  properties:
                    id:
                      description: ID names the rule for trace/audit purposes.
                      type: string
                    rolloutRef:
                      description: |-
                        RolloutRef names a RolloutPolicy CR in the same namespace whose
                        bucketing+variants are inlined at publish time. Mutually
                        exclusive with Value.
                      type: string
                    value:
                      description: |-
                        Value is the static value served when the rule fires. Mutually
                        exclusive with RolloutRef.
                      x-kubernetes-preserve-unknown-fields: true
                    when:
                      description: |-
                        When is the predicate that decides whether this rule fires.
                        Permissive shape; validated by the upstream API on publish.
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - id
                  - when
                  type: object
                type: array
              valueType:
                default: boolean
                description: ValueType matches the IR ValueType enum.
                enum:
                - boolean
                - string
                - number
                - object
                type: string
            required:
            - default
            - key
            - name
            - projectSlug
            - valueType
            type: object
          status:
            description: FlagStatus is the observed state of a Flag.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastPublishedVersion:
                description: |-
                  LastPublishedVersion is the version returned by the most recent
                  successful PublishFlagVersion call. When per-environment
                  bindings are in use this records the last call across all of
                  them.
                format: int32
                type: integer
              lastSyncTime:
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
